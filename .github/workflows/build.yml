name: Build and Release AkhilCopilot

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'

jobs:
  # ============================================================================
  # VALIDATE: Type-check and build frontend (runs on Ubuntu for all PRs)
  # ============================================================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm ci

      - name: Validate TypeScript (no emit)
        run: |
          npx tsc -p electron/tsconfig.json --noEmit
          npm run build

      - name: Upload lock file
        uses: actions/upload-artifact@v4
        with:
          name: updated-package-lock
          path: package-lock.json
          retention-days: 7

  # ============================================================================
  # BUILD WINDOWS
  # ============================================================================
  build-windows:
    needs: validate
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          Remove-Item -Path "package-lock.json" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "node_modules" -Recurse -Force -ErrorAction SilentlyContinue
          npm ci

      - name: Rebuild native modules for Electron
        run: |
          npm install --save-dev @electron/rebuild
          npx @electron/rebuild
          npm rebuild better-sqlite3 --force

      # ────────────────────────────────────────────────────────────────────────
      # STEP 1: Build Vite frontend → outputs to ./dist
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Vite frontend
        run: npm run build

      # ────────────────────────────────────────────────────────────────────────
      # STEP 2: Build Electron TypeScript → outputs to ./dist-electron/electron/
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Electron TypeScript
        run: |
          # Clean previous electron builds ONLY (preserve dist from vite)
          Remove-Item -Path "dist-electron" -Recurse -Force -ErrorAction SilentlyContinue
          
          # Compile Electron main process using electron/tsconfig.json
          Write-Host "🔧 Compiling electron/main.ts..." -ForegroundColor Cyan
          npx tsc -p electron/tsconfig.json
          
          # CRITICAL VERIFICATION: Check exact file electron-builder needs
          Write-Host "🔍 Verifying dist-electron/electron/main.js..." -ForegroundColor Cyan
          if (Test-Path "dist-electron/electron/main.js") {
            Write-Host "✅ SUCCESS: dist-electron/electron/main.js exists" -ForegroundColor Green
            Get-Item "dist-electron/electron/main.js" | Select-Object FullName, Length, LastWriteTime
          } else {
            Write-Host "❌ CRITICAL ERROR: dist-electron/electron/main.js NOT FOUND!" -ForegroundColor Red
            Write-Host "`n📁 All files in dist-electron:" -ForegroundColor Yellow
            Get-ChildItem -Path dist-electron -Recurse -ErrorAction SilentlyContinue | ForEach-Object { 
              Write-Host "   $($_.FullName)" 
            }
            Write-Host "`n📋 package.json main field:" -ForegroundColor Yellow
            $pkg = Get-Content package.json | ConvertFrom-Json
            Write-Host "   main: $($pkg.main)"
            exit 1
          }

      # ────────────────────────────────────────────────────────────────────────
      # STEP 3: Build Electron app with electron-builder
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Electron app (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkhilCopilot-Windows
          path: |
            release/*.exe
            release/*.nsis
            release/*.msi
            release/win-*-unpacked
          retention-days: 30

  # ============================================================================
  # BUILD MACOS (x64 + arm64)
  # ============================================================================
  build-macos:
    needs: validate
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm ci

      # ────────────────────────────────────────────────────────────────────────
      # STEP 1: Build Vite frontend
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Vite frontend
        run: npm run build

      # ────────────────────────────────────────────────────────────────────────
      # STEP 2: Build Electron TypeScript
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Electron TypeScript
        run: |
          # Clean previous electron builds ONLY
          rm -rf dist-electron
          
          # Compile Electron main process
          echo "🔧 Compiling electron/main.ts..."
          npx tsc -p electron/tsconfig.json
          
          # CRITICAL VERIFICATION
          echo "🔍 Verifying dist-electron/electron/main.js..."
          if [ -f "dist-electron/electron/main.js" ]; then
            echo "✅ SUCCESS: dist-electron/electron/main.js exists"
            ls -la dist-electron/electron/main.js
          else
            echo "❌ CRITICAL ERROR: dist-electron/electron/main.js NOT FOUND!"
            echo ""
            echo "📁 All files in dist-electron:"
            find dist-electron -type f 2>/dev/null | sed 's/^/   /'
            echo ""
            echo "📋 package.json main field:"
            node -p "require('./package.json').main"
            exit 1
          fi

      # ────────────────────────────────────────────────────────────────────────
      # STEP 3: Build Electron app
      # ────────────────────────────────────────────────────────────────────────
      - name: Build for macOS (${{ matrix.arch }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --mac --${{ matrix.arch }} --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkhilCopilot-macOS-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.app
          retention-days: 30

  # ============================================================================
  # BUILD LINUX
  # ============================================================================
  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm ci

      # ────────────────────────────────────────────────────────────────────────
      # STEP 1: Build Vite frontend
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Vite frontend
        run: npm run build

      # ────────────────────────────────────────────────────────────────────────
      # STEP 2: Build Electron TypeScript
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Electron TypeScript
        run: |
          # Clean previous electron builds ONLY
          rm -rf dist-electron
          
          # Compile Electron main process
          echo "🔧 Compiling electron/main.ts..."
          npx tsc -p electron/tsconfig.json
          
          # CRITICAL VERIFICATION
          echo "🔍 Verifying dist-electron/electron/main.js..."
          if [ -f "dist-electron/electron/main.js" ]; then
            echo "✅ SUCCESS: dist-electron/electron/main.js exists"
            ls -la dist-electron/electron/main.js
          else
            echo "❌ CRITICAL ERROR: dist-electron/electron/main.js NOT FOUND!"
            echo ""
            echo "📁 All files in dist-electron:"
            find dist-electron -type f 2>/dev/null | sed 's/^/   /'
            echo ""
            echo "📋 package.json main field:"
            node -p "require('./package.json').main"
            exit 1
          fi

      # ────────────────────────────────────────────────────────────────────────
      # STEP 3: Build Electron app
      # ────────────────────────────────────────────────────────────────────────
      - name: Build for Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --linux --x64 --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkhilCopilot-Linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
          retention-days: 30

  # ============================================================================
  # CREATE GITHUB RELEASE (only on version tags)
  # ============================================================================
  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.nsis
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.snap
          generate_release_notes: true
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # SYNC TO PUBLIC REPO (on main branch push)
  # ============================================================================
  sync-to-public:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify Build Integrity
        run: |
          npm ci
          npx tsc -p electron/tsconfig.json --noEmit
          npm run build

      - name: Sync to Public Repository
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$PUBLIC_REPO_PAT" ]; then
            echo "⚠️ Warning: PUBLIC_REPO_PAT secret missing. Skipping sync."
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Cloning public repository..."
          git clone https://$PUBLIC_REPO_PAT@github.com/posaakhil/AkhilKingsCopilot.git public-repo
          echo "Syncing files..."
          rsync -av --delete \
            --exclude '.git' \
            --exclude 'public-repo' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'dist-electron' \
            --exclude 'release' \
            --exclude 'native-module/target' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '*.key' \
            --exclude '*.pem' \
            --exclude 'secrets.json' \
            --exclude '*.log' \
            --exclude 'premium' \
            ./ public-repo/
          cd public-repo
          git add .
          if git diff --staged --quiet; then
            echo "No changes to sync."
          else
            git commit -m "$COMMIT_MESSAGE" -m "Auto-sync from private repo: ${{ github.sha }}"
            git push origin HEAD:main
            echo "✅ Successfully synced!"
          fi